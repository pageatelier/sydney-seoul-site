<script>
(function () {
  const routes = {
    kr: { home: "/", about: "/about", menu: "/menu", visit: "/visit", reservation: "/reservation" },
    en: { home: "/en", about: "/en-about", menu: "/en-menu", visit: "/en-visit", reservation: "/en-reservation" }
  };

  const currentPath = window.location.pathname.replace(/\/+$/, "") || "/";
  const isEnglishPage =
    currentPath === routes.en.home ||
    currentPath === "/en/index.html" ||
    currentPath.indexOf("/en-") === 0 ||
    currentPath.indexOf("/en/") === 0;

  const currentLanguage = isEnglishPage ? "en" : "kr";

  function findCurrentPageKey(path) {
    const normalizedPath = (path === "/home" || path === "/index" || path === "/index.html") ? "/" : path;
    const languages = ["kr", "en"];
    const pageKeys = Object.keys(routes.kr);
    for (let i = 0; i < languages.length; i += 1) {
      const language = languages[i];
      for (let j = 0; j < pageKeys.length; j += 1) {
        const pageKey = pageKeys[j];
        if (routes[language][pageKey] === normalizedPath) return pageKey;
      }
    }
    return "home";
  }

  const currentPageKey = findCurrentPageKey(currentPath);

  document.querySelectorAll("[data-ss-page]").forEach(function (link) {
    const pageKey = link.getAttribute("data-ss-page");
    const destination = routes[currentLanguage][pageKey];
    if (destination) link.setAttribute("href", destination);
  });

  document.querySelectorAll("[data-ss-language]").forEach(function (link) {
    const language = link.getAttribute("data-ss-language");
    const destination = routes[language][currentPageKey];
    link.setAttribute("href", destination);
    const isActive = language === currentLanguage;
    link.classList.toggle("active", isActive);
    if (isActive) link.setAttribute("aria-current", "page");
    else link.removeAttribute("aria-current");
  });

  const header = document.getElementById("ssSiteHeader");
  const openButton = document.querySelector(".ss-menu-open");
  const closeButton = document.querySelector(".ss-menu-close");
  const overlay = document.querySelector(".ss-menu-overlay");
  const panel = document.querySelector(".ss-menu-panel");
  const menuLinks = document.querySelectorAll(".ss-menu-overlay a");

  var SCROLL_THRESHOLD = 30;
  var scrollTicking = false;

  function getScrollTop(target) {
    if (!target || target === document || target === window) {
      return window.pageYOffset || document.documentElement.scrollTop || document.body.scrollTop || 0;
    }
    return target.scrollTop || 0;
  }

  function applyScrollState(scrollTop) {
    if (!header) return;
    if (scrollTop > SCROLL_THRESHOLD) header.classList.add("is-scrolled");
    else header.classList.remove("is-scrolled");
  }

  function handleScroll(event) {
    if (scrollTicking) return;
    scrollTicking = true;
    var target = event ? event.target : null;
    requestAnimationFrame(function () {
      applyScrollState(getScrollTop(target));
      scrollTicking = false;
    });
  }

  window.addEventListener("scroll", handleScroll, { passive: true });
  document.addEventListener("scroll", handleScroll, { passive: true, capture: true });
  applyScrollState(getScrollTop(window));

  if (!openButton || !closeButton || !overlay) return;

  function openMenu() {
    overlay.classList.add("is-open");
    openButton.classList.add("is-hidden");
    document.body.classList.add("ss-menu-lock");
    openButton.setAttribute("aria-expanded", "true");
    overlay.setAttribute("aria-hidden", "false");
  }

  function closeMenu() {
    overlay.classList.remove("is-open");
    openButton.classList.remove("is-hidden");
    document.body.classList.remove("ss-menu-lock");
    openButton.setAttribute("aria-expanded", "false");
    overlay.setAttribute("aria-hidden", "true");
  }

  openButton.addEventListener("click", openMenu);
  closeButton.addEventListener("click", closeMenu);
  menuLinks.forEach(function (link) { link.addEventListener("click", closeMenu); });
  overlay.addEventListener("click", function (event) {
    if (event.target === overlay && !panel.contains(event.target)) closeMenu();
  });
  document.addEventListener("keydown", function (event) {
    if (event.key === "Escape") closeMenu();
  });
})();
</script>
